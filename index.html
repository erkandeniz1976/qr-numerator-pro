<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Numaratör Pro</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; text-align: center; padding: 20px; background: #eef2f7; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; width: 100%; box-sizing: border-box; }
        button { display: block; color: white; border: none; padding: 15px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 12px 0; width: 100%; font-weight: bold; transition: 0.2s; text-decoration: none; box-sizing: border-box; }
        button:hover { opacity: 0.9; }
        .hidden { display: none !important; }
        .badge { background: #e2e8f0; padding: 6px 12px; border-radius: 5px; font-size: 14px; font-weight: bold; display: inline-block; }
        .info-box { background: #eff6ff; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 15px; border: 1px solid #bfdbfe; color: #1e40af; text-align: left; }
        input { padding: 12px; width: 100%; margin-bottom: 12px; border: 2px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="main-title" style="color: #2563eb;">QR Numaratör</h2>
        <p id="main-message" style="font-size: 15px; color: #555;">Sistem Aktif.</p>

        <!-- EKRAN 1: Sürücü Yönetim Paneli -->
        <div id="panel-ekrani">
            <div class="info-box">
                🔍 <b>Mod Ara:</b> Aşağıdaki kutuya yazarak modları filtreleyin:
                <input type="text" id="mod-search" onkeyup="modFiltrele()" placeholder="Aramak için yazın..." style="margin-top:8px; margin-bottom:0;">
            </div>

            <div class="info-box" style="background:#f0fdf4; border-color:#bbf7d0; color:#166534;">
                🔒 <b>Numara Gizlilik Ayarı:</b>
                <input type="tel" id="driver-phone" placeholder="Telefon numaranızı yazın" style="margin-top:8px;">
                <div style="display: flex; gap: 10px;">
                    <button onclick="numaraAyarla(true)" style="background:#16a34a; font-size:13px; padding:10px; margin:0; flex:1;">🔓 Numarayı Göster</button>
                    <button onclick="numaraAyarla(false)" style="background:#dc2626; font-size:13px; padding:10px; margin:0; flex:1;">🔒 Numarayı Gizle</button>
                </div>
            </div>

            <h3 style="text-align: left; font-size: 16px;">1. Modunuzu Seçin:</h3>
            <div id="mod-listesi">
                <button class="mod-btn" onclick="modSec('🚗 Hatalı Park Modu')" style="background:#28a745;">🚗 Hatalı Park Modu</button>
                <button class="mod-btn" onclick="modSec('⚠️ Acil Durum Modu')" style="background:#ffc107; color:#222;">⚠️ Acil Durum Modu</button>
                <button class="mod-btn" onclick="modSec('💼 Toplantı/Meşgul Modu')" style="background:#17a2b8;">💼 Toplantı/Meşgul Modu</button>
                <p id="hata-mesaji" class="no-result hidden" style="color:#94a3b8; font-style:italic;">Aradığınız mod bulunamadı...</p>
            </div>
            
            <h3>2. Vatandaş Ne Görecek?</h3>
            <button onclick="vatandasEkraniniAc()" style="background:#6c757d;">🔍 Vatandaş Ekranını Aç (Test)</button>
        </div>

        <!-- EKRAN 2: Vatandaşın Göreceği Ekran -->
        <div id="vatandas-ekrani" class="hidden">
            <div style="margin: 20px 0;">
                <span id="aktif-mod-rozeti" class="badge">Mod: Belirlenmedi</span>
            </div>
            <p id="vatandas-mesaji" style="font-weight:bold; font-size:16px; line-height: 1.5; background: #fff9db; padding: 15px; border-radius: 8px; border: 1px dashed #f59f00;"></p>
            
            <!-- SÜRÜCÜ İSTERSE GÖRÜNECEK NUMARA ALANI -->
            <div id="vatandas-numara-alani" class="hidden" style="background: #f0fdf4; padding: 15px; border-radius: 8px; border: 2px solid #bbf7d0; margin-bottom: 15px; color: #166534; font-weight: bold; font-size: 18px;">
                📞 Telefon: <a id="phone-link" href="#" style="color:#15803d;"></a>
            </div>

            <!-- İLETİŞİM BUTONLARI -->
            <button onclick="alert('🎉 Yazılı bildirim sürücüye başarıyla iletildi!')" style="background:#2563eb; font-size:16px; padding:15px; width:100%;">💬 Sürücüye Mesaj Gönder</button>
            <button onclick="alert('🌐 İnternet üzerinden numarasız arama başlatılıyor...')" style="background:#059669; font-size:16px; padding:15px; width:100%; margin-top: 5px;">🌐 Sürücüyü İnternetten Ara</button>
            
            <button onclick="paneleGeriDon()" style="background:#6c757d; font-size:14px; margin-top: 15px;">↩️ Panele Geri Dön</button>
        </div>
    </div>

    <script>
        function sayfaBaslat() {
            const kayitliMod = localStorage.getItem("secili_qr_modu") || "🚗 Hatalı Park Modu";
            const numaraDurumu = localStorage.getItem("qr_numara_gosterilsin_mi") || "false";
            const kayitliNumara = localStorage.getItem("qr_surucu_numarasi") || "";
            
            let gizlilikYazisi = numaraDurumu === "true" ? "Numaranız Görünür 🔓" : "Numaranız Gizli 🔒";
            document.getElementById('main-message').innerHTML = `Sistem Aktif. ${gizlilikYazisi}<br><b>Güncel Durum:</b> ${kayitliMod}`;
            document.getElementById('driver-phone').value = kayitliNumara;
        }

        function numaraAyarla(gosterilsinMi) {
            const numara = document.getElementById('driver-phone').value.trim();
            if (gosterilsinMi && numara.length < 10) {
                alert("❌ Lütfen önce geçerli bir telefon numarası yazın!");
                return;
            }
            localStorage.setItem("qr_surucu_numarasi", numara);
            localStorage.setItem("qr_numara_gosterilsin_mi", gosterilsinMi ? "true" : "false");
            alert(gosterilsinMi ? "🔓 Numaranız vatandaş ekranına eklendi!" : "🔒 Numaranız tamamen gizlendi!");
            sayfaBaslat();
        }

        function modSec(yeniMod) {
            localStorage.setItem("secili_qr_modu", yeniMod);
            sayfaBaslat();
            alert(`Durum güncellendi:\n${yeniMod}`);
        }

        function modFiltrele() {
            const aramaTerimi = document.getElementById('mod-search').value.trim().toLowerCase();
            const butonlar = document.getElementsByClassName('mod-btn');
            let bulunanModSayisi = 0;

            for (let i = 0; i < butonlar.length; i++) {
                if (butonlar[i].innerText.toLowerCase().includes(aramaTerimi)) {
                    butonlar[i].style.display = "block";
                    bulunanModSayisi++;
                } else {
                    butonlar[i].style.display = "none";
                }
            }
            document.getElementById('hata-mesaji').style.display = bulunanModSayisi === 0 ? "block" : "none";
        }

        function vatandasEkraniniAc() {
            document.getElementById('panel-ekrani').classList.add('hidden');
            document.getElementById('main-title').innerText = "📱 QR İletişim Sistemi";
            
            const guncelMod = localStorage.getItem("secili_qr_modu") || "🚗 Hatalı Park Modu";
            document.getElementById('aktif-mod-rozeti').innerText = `Durum: ${guncelMod}`;
            
            const numaraGosterilsinMi = localStorage.getItem("qr_numara_gosterilsin_mi") === "true";
            const kayitliNumara = localStorage.getItem("qr_surucu_numarasi") || "";
            
            if (numaraGosterilsinMi && kayitliNumara) {
                document.getElementById('vatandas-numara-alani').classList.remove('hidden');
                document.getElementById('phone-link').innerText = kayitliNumara;
                document.getElementById('phone-link').href = `tel:${kayitliNumara}`;
            } else {
                document.getElementById('vatandas-numara-alani').classList.add('hidden');
            }
            
            const mesajAlani = document.getElementById('vatandas-mesaji');
            if(guncelMod.includes("Hatalı Park")) mesajAlani.innerText = "🚗 Araç hatalı park edilmiştir. Aşağıdaki butonlardan sahibine ulaşabilirsiniz.";
            else if(guncelMod.includes("Acil Durum")) mesajAlani.innerText = "⚠️ Araç başında acil bir durum söz konusudur! Lütfen hemen bildirim gönderin.";
            else if(guncelMod.includes("Toplantı")) mesajAlani.innerText = "💼 Araç sahibi şu anda meşguldür. Çok acil değilse lütfen bekleyiniz.";

            document.getElementById('vatandas-ekrani').classList.remove('hidden');
        }

        function paneleGeriDon() {
            document.getElementById('vatandas-ekrani').classList.add('hidden');
            document.getElementById('main-title').innerText = "QR Numaratör";
            document.getElementById('panel-ekrani').classList.remove('hidden');
            document.getElementById('mod-search').value = "";
            modFiltrele();
            sayfaBaslat();
        }

        window.onload = sayfaBaslat;
    </script>
</body>
</html>
