<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qr-numerator-pro</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; text-align: center; padding: 20px; background: #f4f4f9; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: inline-block; max-width: 400px; width: 100%; box-sizing: border-box; }
        button { background: #0070f3; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 15px; margin: 8px 0; width: 100%; font-weight: bold; transition: 0.2s; }
        button:hover { background: #0051b3; }
        input { padding: 12px; width: 100%; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="title">QR Numaratör</h2>
        <p id="message">Sistem kontrol ediliyor...</p>

        <!-- DURUM A: İlk Aktivasyon Ekranı -->
        <div id="activation-zone" class="hidden">
            <input type="text" id="recovery-input" placeholder="Kartonetteki Kurtarma Kodunu Girin">
            <input type="password" id="pin-input" placeholder="4 Haneli PIN Belirleyin" maxlength="4">
            <button onclick="activateQR()">Etiketi Anonim Aktive Et</button>
        </div>

        <!-- DURUM B: Müşteri Yönetim Paneli -->
        <div id="owner-zone" class="hidden">
            <h4 style="margin-bottom:8px; text-align:left;">Görünür Modu Seçin:</h4>
            <button onclick="modSec('🚗 Hatalı Park Modu')" style="background:#28a745;">🚗 Hatalı Park Modu</button>
            <button onclick="modSec('⚠️ Acil Durum Modu')" style="background:#ffc107; color:#222;">⚠️ Acil Durum Modu</button>
            <button onclick="modSec('💼 Toplantı/Meşgul Modu')" style="background:#17a2b8;">💼 Toplantı/Meşgul Modu</button>
        </div>
    </div>

    <script>
        // Sayfa ilk açıldığında aktivasyon formunu görünür yapar
        function init() {
            document.getElementById('message').innerText = "Bu QR etiketi henüz aktive edilmemiş. Sahibiyseniz bilgileri girerek hemen başlatın.";
            document.getElementById('activation-zone').classList.remove('hidden');
        }

        // Aktivasyon doğrulama fonksiyonu
        function activateQR() {
            const recoveryInput = document.getElementById('recovery-input').value.trim();
            const pinInput = document.getElementById('pin-input').value.trim();

            if(!recoveryInput || !pinInput) { 
                alert("Lütfen boş alan bırakmayın."); 
                return; 
            }
            
            // Kontrol: Kurtarma kodu "testkodu123" ve PIN "1923" olmalıdır
            if(recoveryInput === "testkodu123" && pinInput === "1923") {
                alert("Aktivasyon Başarılı!");
                
                // Formu kapat, yönetim panelini aç
                document.getElementById('activation-zone').classList.add('hidden');
                document.getElementById('title').innerText = "🛠️ Müşteri Paneli";
                
                // Hafızadaki modu kontrol et ve ekrana yaz
                const mevcutMod = localStorage.getItem("secilen_mod") || "Seçilmedi";
                document.getElementById('message').innerText = `Etiketiniz aktif. Numaranız tamamen gizlidir.\n(Şu Anki Mod: ${mevcutMod})`;
                
                document.getElementById('owner-zone').classList.remove('hidden');
            } else {
                alert("Hatalı kod veya şifre girdiniz.");
            }
        }

        // Seçilen modu hafızaya (LocalStorage) kaydeden fonksiyon
        function modSec(modAdi) {
            // Tarayıcı hafızasına modu kaydediyoruz
            localStorage.setItem("secilen_mod", modAdi);
            
            // Kullanıcıya bilgi mesajı veriyoruz
            alert(`✅ Görünür mod başarıyla güncellendi: ${modAdi}`);
            
            // Ekrandaki bilgi yazısını anlık olarak değiştiriyoruz
            document.getElementById('message').innerText = `Etiketiniz aktif. Numaranız tamamen gizlidir.\n(Şu Anki Mod: ${modAdi})`;
        }

        // Sayfa yüklendiğinde otomatik başlat
        window.onload = init;
    </script>
</body>
</html>
