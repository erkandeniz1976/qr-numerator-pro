<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qr-numerator-pro-v19</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; text-align: center; padding: 20px; background: #eef2f7; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; width: 100%; box-sizing: border-box; }
        button, .btn-link { display: block; color: white; border: none; padding: 15px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 12px 0; width: 100%; font-weight: bold; transition: 0.2s; text-decoration: none; box-sizing: border-box; }
        input { padding: 12px; width: 100%; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .hidden { display: none; }
        .badge { background: #e2e8f0; padding: 6px 12px; border-radius: 5px; font-size: 14px; font-weight: bold; display: inline-block; }
        .info-box { background: #e8f5e9; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 15px; border: 1px solid #c8e6c9; color: #2e7d32; text-align: left; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="main-title" style="color: #25d366;">QR Numaratör V19</h2>
        <p id="main-message" style="font-size: 15px; color: #555;">Yükleniyor...</p>

        <!-- EKRAN 1: Yönetici Paneli -->
        <div id="panel-ekrani">
            <div class="info-box">
                🔒 <b>Gizli İletişim Kimliği Belirleyin:</b><br>
                WhatsApp yönlendirmesi için numaranızı girin (Vatandaşlar bu numarayı ekranda asla göremez):<br>
                <input type="tel" id="user-phone-input" placeholder="Örn: 05321234567" style="margin-top: 8px; margin-bottom: 8px;">
                <button onclick="numaraKaydet()" style="background:#25d366; padding:6px 12px; font-size:13px; width:auto; margin:0;">🔒 Kimliği Kaydet</button>
            </div>

            <h3 style="text-align: left; font-size: 16px; margin-top: 10px;">1. Modunuzu Seçin:</h3>
            <button onclick="modDegistir('🚗 Hatalı Park Modu')" style="background:#28a745;">🚗 Hatalı Park Modu</button>
            <button onclick="modDegistir('⚠️ Acil Durum Modu')" style="background:#ffc107; color:#222;">⚠️ Acil Durum Modu</button>
            <button onclick="modDegistir('💼 Toplantı/Meşgul Modu')" style="background:#17a2b8;">💼 Toplantı/Meşgul Modu</button>
            
            <h3 style="text-align: left; font-size: 16px; margin-top: 25px;">2. Vatandaş Ne Görecek?</h3>
            <button onclick="vatandasEkraniniAc()" style="background:#6c757d;">🔍 Vatandaş Ekranını Aç</button>
        </div>

        <!-- EKRAN 2: Vatandaşın Göreceği Ekran -->
        <div id="vatandas-ekrani" class="hidden">
            <div style="margin: 20px 0;">
                <span id="aktif-mod-rozeti" class="badge">Mod: Belirlenmedi</span>
            </div>
            <p id="vatandas-mesaji" style="font-weight:bold; font-size:16px; line-height: 1.5; background: #fff9db; padding: 15px; border-radius: 8px; border: 1px dashed #f59f00;"></p>
            
            <!-- TARAYICININ ASLA ENGELLEYEMEDİĞİ SAF İNTERNET LİNKİ -->
            <a id="bildirim-linki" href="#" class="btn-link" style="background:#25d366;">💬 Araç Sahibine Anonim Bildirim Gönder</a>
            
            <button onclick="paneleGeriDon()" style="background:#6c757d; font-size:14px; margin-top: 15px;">↩️ Panele Geri Dön</button>
        </div>
    </div>

    <script>
        function sayfaBaslat() {
            const kayıtlıMod = localStorage.getItem("secili_qr_modu") || "🚗 Hatalı Park Modu";
            document.getElementById('main-message').innerHTML = `Sistem Aktif. Numaranız %100 Gizlidir.<br><b>Güncel Durum:</b> ${kayıtlıMod}`;
            
            let kayitliNumara = localStorage.getItem("qr_secure_phone") || "";
            // Görsel olarak kutuda 90 olmadan temiz gösterelim
            if(kayitliNumara.startsWith("90")) {
                document.getElementById('user-phone-input').value = "0" + kayitliNumara.substring(2);
            } else {
                document.getElementById('user-phone-input').value = kayitliNumara;
            }
            
            linkiGuncelle();
        }

        function numaraKaydet() {
            let numara = document.getElementById('user-phone-input').value.trim();
            if(!numara || numara.length < 10) {
                alert("❌ Lütfen geçerli bir numara girin.");
                return;
            }
            if(!numara.startsWith("90")) {
                numara = "90" + numara.replace(/^0/, "");
            }
            localStorage.setItem("qr_secure_phone", numara);
            alert("✅ Kimliğiniz başarıyla kaydedildi!");
            linkiGuncelle();
        }

        function modDegistir(yeniMod) {
            localStorage.setItem("secili_qr_modu", yeniMod);
            document.getElementById('main-message').innerHTML = `Sistem Aktif. Numaranız %100 Gizlidir.<br><b>Güncel Durum:</b> ${yeniMod}`;
            alert(`Sistem başarıyla güncellendi:\n${yeniMod}`);
            linkiGuncelle();
        }

        // TARAYICI ENGELİNİ YIKAN EN KRİTİK FONKSİYON
        function linkiGuncelle() {
            const guncelMod = localStorage.getItem("secili_qr_modu") || "🚗 Hatalı Park Modu";
            const gizliNumara = localStorage.getItem("qr_secure_phone") || "";
            
            const hazirMesaj = `🔔 QR NUMARATÖR BİLDİRİMİ!\n\nAracınızın başındaki bir vatandaş size bildirim gönderdi.\nAktif Durumunuz: ${guncelMod}\nZaman: ${new Date().toLocaleTimeString('tr-TR')}`;
            
            const linkButonu = document.getElementById('bildirim-linki');
            
            if(!gizliNumara) {
                linkButonu.href = "javascript:alert('❌ Hata: Önce yönetim panelinden kimliğinizi kaydetmelisiniz!');";
            } else {
                // Doğrudan HTML köprüsü oluşturuyoruz, tarayıcı tıklamayı asla durduramaz
                linkButonu.href = `https://whatsapp.com{gizliNumara}&text=${encodeURIComponent(hazirMesaj)}`;
            }
        }

        function vatandasEkraniniAc() {
            linkiGuncelle(); // Her ihtimale karşı linki tekrar tazele
            document.getElementById('panel-ekrani').classList.add('hidden');
            document.getElementById('main-title').innerText = "📱 QR İletişim Sistemi";
            document.getElementById('main-message').innerText = "Bu aracın sahibi numarasını %100 gizli tutarak sizinle iletişim kurmaktadır.";
            
            const guncelMod = localStorage.getItem("secili_qr_modu") || "🚗 Hatalı Park Modu";
            document.getElementById('aktif-mod-rozeti').innerText = `Durum: ${guncelMod}`;
            
            const mesajAlani = document.getElementById('vatandas-mesaji');
            if(guncelMod.includes("Hatalı Park")) {
                mesajAlani.innerText = "🚗 Araç hatalı park edilmiştir. Sahibi kısa süre içinde gelecektir. Aşağıdaki butondan sahibine gizli bildirim atabilirsiniz.";
            } else if(guncelMod.includes("Acil Durum")) {
                mesajAlani.innerText = "⚠️ Araç başında acil bir durum söz konusudur! Lütfen aşağıdaki butonu kullanarak sahibine gizli bildirim ulaştırın.";
            } else if(guncelMod.includes("Toplantı")) {
                mesajAlani.innerText = "💼 Araç sahibi şu anda meşguldür veya toplantıdadır. Çok acil değilse lütfen bekleyiniz.";
            }

            document.getElementById('vatandas-ekrani').classList.remove('hidden');
        }

        function paneleGeriDon() {
            document.getElementById('vatandas-ekrani').classList.add('hidden');
            document.getElementById('main-title').innerText = "QR Numaratör V19";
            document.getElementById('panel-ekrani').classList.remove('hidden');
            sayfaBaslat();
        }

        window.onload = sayfaBaslat;
    </script>
</body>
</html>
